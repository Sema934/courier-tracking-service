spring.application.name=courier-tracking-service

# --- Database Settings ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:courier_tracking}?createDatabaseIfNotExist=true&useSSL=false&autoReconnect=true&maxReconnect=10&useUnicode=true&characterEncoding=utf8&serverTimezone=Turkey&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA & Hibernate Settings ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.connection.charSet=UTF-8

# --- SQL Init (Loads data.sql) ---
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# --- Server Settings ---
server.port=8080
server.error.whitelabel.enabled=false

spring.threads.virtual.enabled=true