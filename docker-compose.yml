version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    container_name: courier_tracking_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: courier_tracking
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: courier_tracking_service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: courier_tracking
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: